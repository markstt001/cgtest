<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>采购谈判风格测试 2.0 - 发现你的谈判超能力</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .hidden { display: none !important; }
        .hero { text-align: center; padding: 40px 0; }
        .hero h1 { font-size: 28px; font-weight: 700; color: #333; margin-bottom: 10px; }
        .hero p { font-size: 16px; color: #666; margin-bottom: 30px; }
        .hero-stats { display: flex; justify-content: center; gap: 30px; margin: 30px 0; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 32px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #999; }
        .btn-start { display: block; width: 100%; padding: 18px; background: linear-gradient(90deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 30px; }
        .progress { background: #e0e0e0; border-radius: 10px; height: 8px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; width: 3.57%; transition: width 0.3s; }
        .progress-text { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .milestone-feedback { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-weight: 600; animation: slideIn 0.5s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .question-scene { font-size: 14px; color: #667eea; background: #f0f4ff; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-weight: 600; }
        .question { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 25px; line-height: 1.6; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 15px 20px; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .option:hover { border-color: #667eea; background: #f5f6ff; }
        .option.selected { border-color: #667eea; background: #667eea; color: white; }
        .option-label { font-weight: 600; margin-bottom: 5px; }
        .option-text { font-size: 14px; line-height: 1.5; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; gap: 10px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn-prev { background: #f0f0f0; color: #666; }
        .btn-prev:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-next { background: linear-gradient(90deg, #667eea, #764ba2); color: white; }
        .footer { text-align: center; margin-top: 20px; color: #999; font-size: 12px; }
        .result-header { text-align: center; margin-bottom: 30px; }
        .animal { font-size: 80px; margin-bottom: 10px; }
        .code { font-size: 36px; font-weight: bold; color: #667eea; margin-bottom: 5px; }
        .name { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 5px; }
        .role { font-size: 16px; color: #666; margin-bottom: 10px; }
        .result-stats { display: flex; justify-content: space-around; margin: 20px 0; }
        .result-stat { text-align: center; }
        .result-stat-value { font-size: 20px; font-weight: bold; color: #667eea; }
        .result-stat-label { font-size: 12px; color: #999; }
        .section { margin: 25px 0; padding: 20px; background: #f8f9ff; border-radius: 12px; }
        .section-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .section-title .icon { font-size: 20px; }
        .item { margin: 12px 0; padding: 12px; background: white; border-radius: 8px; }
        .item-label { font-size: 14px; font-weight: 600; color: #667eea; margin-bottom: 5px; }
        .item-text { font-size: 14px; color: #666; line-height: 1.8; }
        .strength-item { padding: 10px 12px; margin: 8px 0; background: #f0fdf4; border-left: 4px solid #10b981; border-radius: 6px; font-size: 14px; color: #333; }
        .weakness-item { padding: 10px 12px; margin: 8px 0; background: #fffbeb; border-left: 4px solid #f59e0b; border-radius: 6px; font-size: 14px; color: #333; }
        .action-item { padding: 10px 12px; margin: 8px 0; background: #eff6ff; border-left: 4px solid #3b82f6; border-radius: 6px; font-size: 14px; color: #333; }
        .quote-item { padding: 12px; margin: 8px 0; background: #fff; border-radius: 8px; border-left: 4px solid #667eea; }
        .quote-text { font-size: 14px; color: #333; font-weight: 600; margin-bottom: 4px; }
        .quote-scene { font-size: 12px; color: #999; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .tag { padding: 6px 12px; background: #667eea; color: white; border-radius: 20px; font-size: 12px; }
        .radar-container { width: 100%; height: 250px; margin: 20px 0; background: #fafafa; border-radius: 8px; }
        .course-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; border-radius: 12px; margin-top: 15px; }
        .course-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .course-teacher { font-size: 14px; opacity: 0.9; margin-bottom: 12px; }
        .course-price { font-size: 18px; font-weight: 700; color: #fbbf24; }
        .btn-course { display: block; width: 100%; padding: 12px; background: #fbbf24; color: #333; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; text-align: center; text-decoration: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-share, .btn-retake { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-share { background: linear-gradient(90deg, #667eea, #764ba2); color: white; }
        .btn-retake { background: #f0f0f0; color: #666; }
        .poster-canvas { display: none; }
        .social-proof { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; padding: 15px; border-radius: 12px; margin: 20px 0; text-align: center; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homePage">
            <div class="hero">
                <h1>🎯 采购谈判风格测试</h1>
                <p>28 道真实场景题，5 分钟，发现你的谈判超能力</p>
                <div class="hero-stats">
                    <div class="stat-item">
                        <div class="stat-num">28</div>
                        <div class="stat-label">场景题目</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-num">16</div>
                        <div class="stat-label">谈判风格</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-num">10000+</div>
                        <div class="stat-label">已参与测试</div>
                    </div>
                </div>
                <button class="btn-start" onclick="startTest()">🚀 开始测试</button>
            </div>
        </div>

        <!-- 测试页 -->
        <div id="testPage" class="hidden">
            <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
            <div class="progress-text" id="progressText">1 / 28</div>
            <div id="milestoneFeedback" class="milestone-feedback hidden"></div>
            <div class="question-scene" id="questionScene">场景描述</div>
            <div class="question" id="questionText">加载中...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="nav-buttons">
                <button class="btn btn-prev" id="prevBtn" onclick="prevQuestion()">← 上一题</button>
                <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
            </div>
            <div class="footer">请根据第一反应选择</div>
        </div>

        <!-- 结果页 -->
        <div id="resultPage" class="hidden">
            <div class="result-header">
                <div class="animal" id="animal">🦉</div>
                <div class="code" id="code">ARCD</div>
                <div class="name" id="name">战略架构师</div>
                <div class="role" id="role">战略策划者</div>
                <div class="result-stats">
                    <div class="result-stat">
                        <div class="result-stat-value" id="saving">15-25%</div>
                        <div class="result-stat-label">年省潜力</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-value" id="rarity">约 5%</div>
                        <div class="result-stat-label">稀有度</div>
                    </div>
                </div>
            </div>
            
            <div class="social-proof">
                🏆 你击败了 <span id="beatPercent">87</span>% 的采购同行 | 
                👤 全国第 <span id="rank">3,247</span> 位<span id="rankName">战略架构师</span>
            </div>
            
            <div class="section">
                <div class="section-title"><span class="icon">💪</span> 核心优势</div>
                <div id="strengths"></div>
            </div>
            
            <div class="section">
                <div class="section-title"><span class="icon">⚠️</span> 致命弱点</div>
                <div id="weaknesses"></div>
            </div>
            
            <div class="section">
                <div class="section-title"><span class="icon">💡</span> 行动建议</div>
                <div id="actions"></div>
            </div>
            
            <div class="section">
                <div class="section-title"><span class="icon">📚</span> 推荐学习</div>
                <div class="item">
                    <div class="item-label">推荐课程</div>
                    <div class="course-card">
                        <div class="course-name" id="courseName">《成本结构分析与高级谈判策略》</div>
                        <div class="course-teacher">讲师：<span id="courseTeacher">姜宏锋</span></div>
                        <div class="course-price" id="coursePrice">1999 元</div>
                        <a href="#" class="btn-course" id="courseLink">立即学习 →</a>
                    </div>
                </div>
                <div class="item" style="margin-top:12px;">
                    <div class="item-label">推荐书籍</div>
                    <div class="item-text" id="book"></div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title"><span class="icon">💬</span> 谈判金句</div>
                <div id="quotes"></div>
            </div>
            
            <div class="section">
                <div class="section-title"><span class="icon">📊</span> 能力雷达图</div>
                <canvas id="radarChart" class="radar-container" width="300" height="250"></canvas>
            </div>
            
            <div class="section">
                <div class="section-title"><span class="icon">🏆</span> 名人对标</div>
                <div class="item">
                    <div class="item-label" id="celebrity"></div>
                    <div class="item-text" id="celebrityDesc"></div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title"><span class="icon">🏷️</span> 神秘标签</div>
                <div class="tags" id="tags"></div>
            </div>
            
            <div class="btn-group">
                <button class="btn-share" onclick="generateAndShare()">📸 生成海报分享</button>
                <button class="btn-retake" onclick="retakeTest()">🔄 重测</button>
            </div>
        </div>
        
        <canvas id="posterCanvas" class="poster-canvas"></canvas>
    </div>

    <script src="questions-v2.js"></script>
    <script src="styles-v2.js"></script>
    <script>
        var currentIndex = 0;
        var answers = [];
        var dimensionScores = { A: 0, I: 0, R: 0, T: 0, C: 0, B: 0, D: 0, P: 0 };

        function startTest() {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('testPage').classList.remove('hidden');
            renderQuestion();
            updateProgress();
        }

        function renderQuestion() {
            var q = questions[currentIndex];
            document.getElementById('questionScene').textContent = q.scene;
            document.getElementById('questionText').textContent = q.text;
            var container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            for (var i = 0; i < q.options.length; i++) {
                var opt = q.options[i];
                var div = document.createElement('div');
                div.className = 'option';
                if (answers[currentIndex] === opt.score) div.classList.add('selected');
                div.onclick = (function(o) { return function() { selectOption(o.score); }; })(opt);
                div.innerHTML = '<div class="option-label">' + opt.label + '</div><div class="option-text">' + opt.text + '</div>';
                container.appendChild(div);
            }
            updateNav();
        }

        function selectOption(score) {
            answers[currentIndex] = score;
            var options = document.querySelectorAll('.option');
            for (var i = 0; i < options.length; i++) {
                options[i].classList.remove('selected');
            }
            event.currentTarget.classList.add('selected');
            
            // 统计维度得分
            var q = questions[currentIndex];
            if (q.options.find(o => o.score === score)) {
                dimensionScores[score] = (dimensionScores[score] || 0) + 1;
            }
            
            // 里程碑反馈（每 7 题）
            if ((currentIndex + 1) % 7 === 0 && currentIndex < 27) {
                showMilestoneFeedback(currentIndex + 1);
            } else {
                setTimeout(function() {
                    if (currentIndex < 27) nextQuestion();
                }, 300);
            }
        }
        
        function showMilestoneFeedback(questionNum) {
            var feedbackEl = document.getElementById('milestoneFeedback');
            var dimension = '';
            var percentage = 0;
            
            if (questionNum === 7) {
                var total = dimensionScores.A + dimensionScores.I;
                percentage = total > 0 ? Math.round((dimensionScores.A / total) * 100) : 50;
                feedbackEl.textContent = '✓ 决策风格维度完成！你的分析型倾向：' + percentage + '%';
            } else if (questionNum === 14) {
                var total = dimensionScores.R + dimensionScores.T;
                percentage = total > 0 ? Math.round((dimensionScores.R / total) * 100) : 50;
                feedbackEl.textContent = '✓ 关系导向维度完成！你的关系型倾向：' + percentage + '%';
            } else if (questionNum === 21) {
                var total = dimensionScores.C + dimensionScores.B;
                percentage = total > 0 ? Math.round((dimensionScores.C / total) * 100) : 50;
                feedbackEl.textContent = '✓ 风险态度维度完成！你的谨慎型倾向：' + percentage + '%';
            }
            
            feedbackEl.classList.remove('hidden');
            setTimeout(function() {
                feedbackEl.classList.add('hidden');
                if (currentIndex < 27) nextQuestion();
            }, 2000);
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
                updateProgress();
            }
        }

        function nextQuestion() {
            if (!answers[currentIndex]) {
                alert('请先选择');
                return;
            }
            if (currentIndex < 27) {
                currentIndex++;
                renderQuestion();
                updateProgress();
            } else {
                calculateResult();
            }
        }

        function calculateResult() {
            var scores = {A:0, I:0, R:0, T:0, C:0, B:0, D:0, P:0};
            for (var i = 0; i < questions.length; i++) {
                var answer = answers[i];
                if (answer) scores[answer]++;
            }
            var dim1 = scores.A >= 4 ? 'A' : 'I';
            var dim2 = scores.R >= 4 ? 'R' : 'T';
            var dim3 = scores.C >= 4 ? 'C' : 'B';
            var dim4 = scores.D >= 4 ? 'D' : 'P';
            var code = dim1 + dim2 + dim3 + dim4;
            showResult(code);
        }

        function showResult(code) {
            document.getElementById('testPage').classList.add('hidden');
            document.getElementById('resultPage').classList.remove('hidden');
            var style = styles[code];
            
            // 基本信息
            document.getElementById('animal').textContent = style.animal;
            document.getElementById('code').textContent = code;
            document.getElementById('name').textContent = style.name;
            document.getElementById('role').textContent = style.role;
            document.getElementById('saving').textContent = style.saving;
            document.getElementById('rarity').textContent = style.rarity;
            document.getElementById('beatPercent').textContent = style.beatPercent;
            document.getElementById('rank').textContent = style.rank.toLocaleString();
            document.getElementById('rankName').textContent = style.name;
            
            // 核心优势
            var strengthsContainer = document.getElementById('strengths');
            strengthsContainer.innerHTML = '';
            for (var i = 0; i < style.strengths.length; i++) {
                var div = document.createElement('div');
                div.className = 'strength-item';
                div.textContent = '✓ ' + style.strengths[i];
                strengthsContainer.appendChild(div);
            }
            
            // 致命弱点
            var weaknessesContainer = document.getElementById('weaknesses');
            weaknessesContainer.innerHTML = '';
            for (var i = 0; i < style.weaknesses.length; i++) {
                var div = document.createElement('div');
                div.className = 'weakness-item';
                div.textContent = '⚠️ ' + style.weaknesses[i];
                weaknessesContainer.appendChild(div);
            }
            
            // 行动建议
            var actionsContainer = document.getElementById('actions');
            actionsContainer.innerHTML = '';
            for (var i = 0; i < style.actions.length; i++) {
                var div = document.createElement('div');
                div.className = 'action-item';
                div.textContent = '→ ' + style.actions[i];
                actionsContainer.appendChild(div);
            }
            
            // 推荐课程
            document.getElementById('courseName').textContent = '《' + style.course.name + '》';
            document.getElementById('courseTeacher').textContent = style.course.teacher;
            document.getElementById('coursePrice').textContent = style.course.price;
            document.getElementById('courseLink').href = style.course.link;
            document.getElementById('book').textContent = style.book;
            
            // 谈判金句
            var quotesContainer = document.getElementById('quotes');
            quotesContainer.innerHTML = '';
            for (var i = 0; i < style.quotes.length; i++) {
                var quote = style.quotes[i];
                var div = document.createElement('div');
                div.className = 'quote-item';
                div.innerHTML = '<div class="quote-text">"' + quote.text + '"</div><div class="quote-scene">📍 ' + quote.scene + '</div>';
                quotesContainer.appendChild(div);
            }
            
            // 名人对标
            document.getElementById('celebrity').textContent = style.celebrity + ' · ' + style.celebrityDesc;
            
            // 雷达图
            drawRadarChart(code);
        }

        function drawRadarChart(code) {
            var canvas = document.getElementById('radarChart');
            var ctx = canvas.getContext('2d');
            var width = canvas.width;
            var height = canvas.height;
            var centerX = width / 2;
            var centerY = height / 2;
            var radius = Math.min(width, height) / 2 - 30;
            
            ctx.clearRect(0, 0, width, height);
            
            var dimensions = [
                {name:'分析型',score:0,color:'#4CAF50'},
                {name:'直觉型',score:0,color:'#2196F3'},
                {name:'关系型',score:0,color:'#FF9800'},
                {name:'任务型',score:0,color:'#E91E63'},
                {name:'谨慎型',score:0,color:'#9C27B0'},
                {name:'冒险型',score:0,color:'#FF5722'},
                {name:'直接型',score:0,color:'#00BCD4'},
                {name:'温和型',score:0,color:'#8BC34A'}
            ];
            
            var scores = {A:0, I:0, R:0, T:0, C:0, B:0, D:0, P:0};
            for (var i = 0; i < questions.length; i++) {
                var answer = answers[i];
                if (answer) scores[answer]++;
            }
            
            dimensions[0].score = Math.min(100, (scores.A / 7) * 100);
            dimensions[1].score = Math.min(100, (scores.I / 7) * 100);
            dimensions[2].score = Math.min(100, (scores.R / 7) * 100);
            dimensions[3].score = Math.min(100, (scores.T / 7) * 100);
            dimensions[4].score = Math.min(100, (scores.C / 7) * 100);
            dimensions[5].score = Math.min(100, (scores.B / 7) * 100);
            dimensions[6].score = Math.min(100, (scores.D / 7) * 100);
            dimensions[7].score = Math.min(100, (scores.P / 7) * 100);
            
            // 绘制背景网格
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (var level = 1; level <= 4; level++) {
                var r = (radius / 4) * level;
                ctx.beginPath();
                for (var i = 0; i < 8; i++) {
                    var angle = (Math.PI * 2 / 8) * i - Math.PI / 2;
                    var x = centerX + Math.cos(angle) * r;
                    var y = centerY + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }
            
            // 绘制辐射线
            for (var i = 0; i < 8; i++) {
                var angle = (Math.PI * 2 / 8) * i - Math.PI / 2;
                var x = centerX + Math.cos(angle) * radius;
                var y = centerY + Math.sin(angle) * radius;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = '#e0e0e0';
                ctx.stroke();
            }
            
            // 绘制数据多边形
            ctx.beginPath();
            for (var i = 0; i < 8; i++) {
                var angle = (Math.PI * 2 / 8) * i - Math.PI / 2;
                var r = (dimensions[i].score / 100) * radius;
                var x = centerX + Math.cos(angle) * r;
                var y = centerY + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.fill();
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 绘制维度标签
            for (var i = 0; i < 8; i++) {
                var angle = (Math.PI * 2 / 8) * i - Math.PI / 2;
                var r = radius + 15;
                var x = centerX + Math.cos(angle) * r;
                var y = centerY + Math.sin(angle) * r;
                ctx.fillStyle = '#666';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(dimensions[i].name, x, y);
            }
        }

        function generateAndShare() {
            var code = document.getElementById('code').textContent;
            var style = styles[code];
            var canvas = document.getElementById('posterCanvas');
            var ctx = canvas.getContext('2d');

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            var words = text.split('');
            var line = '';
            for(var i = 0; i < words.length; i++) {
                var testLine = line + words[i];
                var metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && i > 0) {
                    ctx.fillText(line, x, y);
                    line = words[i];
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, y);
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }
