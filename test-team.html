<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团队功能测试</title>
<style>
body{background:#1a3a4a;color:#fff;font-family:-apple-system,sans-serif;padding:20px;max-width:600px;margin:0 auto;}
.card{background:rgba(32,58,67,0.7);border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid rgba(58,106,122,0.3);}
.btn{width:100%;min-height:44px;border:none;border-radius:980px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;padding:14px 28px;}
.btn-gold{background:linear-gradient(135deg,#2c5364,#d4af37);color:#0f2027;}
.btn-red{background:rgba(239,68,68,0.1);color:#ef4444;border:2px solid #ef4444;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.stat{background:rgba(44,83,100,0.3);padding:12px;border-radius:8px;text-align:center;}
.stat-num{font-size:20px;font-weight:800;color:#d4af37;}
.stat-label{font-size:10px;color:#86868b;}
</style>
</head>
<body>
<h1>🧪 团队功能测试</h1>

<div class="card">
<h3>👥 我的团队</h3>
<div id="teamContent"></div>
</div>

<div class="card">
<h3>🔧 操作</h3>
<button class="btn btn-gold" onclick="createTeam()">🎯 创建示例团队</button>
<button class="btn btn-red" onclick="clearTeam()">🗑️ 清除数据</button>
<button class="btn" style="background:rgba(44,83,100,0.6);color:#fff;border:2px solid #3a6a7a;" onclick="showDebug()">📋 查看数据</button>
</div>

<div class="card">
<h3>📝 调试信息</h3>
<pre id="debug" style="background:rgba(0,0,0,0.3);padding:12px;border-radius:8px;font-size:11px;color:#10b981;overflow-x:auto;white-space:pre-wrap;"></pre>
</div>

<script>
function createTeam(){
var t={name:'示例团队 - 采购精英队',inviteCode:'DEMO'+Math.floor(Math.random()*10000),members:[{name:'张三',code:'ARCD'},{name:'李四',code:'ITCP'},{name:'王五',code:'ARBP'},{name:'赵六',code:'ATCD'},{name:'钱七',code:'IRCD'}]};
localStorage.setItem('currentTeam',JSON.stringify(t));
alert('✅ 团队已创建！');
renderTeam();
}

function clearTeam(){
if(confirm('确定清除？')){localStorage.removeItem('currentTeam');alert('已清除');renderTeam();}
}

function showDebug(){
var t=localStorage.getItem('currentTeam');
var e=document.getElementById('debug');
if(!t){e.textContent='暂无数据';return;}
try{var d=JSON.parse(t);var s='团队：'+d.name+'\n邀请码：'+d.inviteCode+'\n成员：'+d.members.length+'人\n\n';
for(var i=0;i<d.members.length;i++){s+='• '+d.members[i].name+' - '+d.members[i].code+'\n';}
e.textContent=s;}catch(err){e.textContent='错误：'+err.message;}
}

function renderTeam(){
var e=document.getElementById('teamContent');
var t=localStorage.getItem('currentTeam');
if(!t){e.innerHTML='<p style="color:#86868b;text-align:center;">暂无团队信息</p>';return;}
try{var d=JSON.parse(t);var m=d.members||[];var c=0;for(var i=0;i<m.length;i++){if(m[i].code)c++;}
e.innerHTML='<div style="font-size:16px;font-weight:700;margin-bottom:12px;">'+d.name+'</div>'+
'<div style="font-size:13px;color:#86868b;margin-bottom:16px;">邀请码：'+d.inviteCode+'</div>'+
'<div class="stats">'+
'<div class="stat"><div class="stat-num">'+m.length+'</div><div class="stat-label">总人数</div></div>'+
'<div class="stat"><div class="stat-num">'+c+'</div><div class="stat-label">已测试</div></div>'+
'<div class="stat"><div class="stat-num">'+(m.length-c)+'</div><div class="stat-label">待测试</div></div>'+
'</div>'+
'<div style="display:flex;flex-direction:column;gap:8px;">'+
'<button class="btn btn-gold" onclick="alert(\'📊 进入仪表盘\\n\\n团队：'+d.name+'\\n成员：'+m.length+'人\')">📊 进入仪表盘</button>'+
'<button class="btn btn-red" onclick="clearTeam()">🗑️ 清除数据</button>'+
'</div>';}catch(err){e.innerHTML='<p style="color:#ef4444;">错误：'+err.message+'</p>';}
}

window.onload=renderTeam;
</script>
</body>
</html>
